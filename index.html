<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proxy mduyk | Premium Shop</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #22c55e; --b: #020617; --c: #1e293b; --r: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--b); color: white; overflow-x: hidden; min-height: 100vh; user-select: none; }
        #splash-screen { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .logo-m { font-family: 'Orbitron'; font-size: 3rem; color: var(--p); text-shadow: 0 0 20px var(--p); animation: z 1.2s ease-out; }
        @keyframes z { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        #app { display: none; }
        .auth-box-wrap { position: fixed; inset: 0; background: #0b1220; display: flex; justify-content: center; align-items: center; padding: 20px; z-index: 999; }
        .auth-box { background: rgba(17, 24, 39, 0.9); padding: 25px; border-radius: 20px; width: 100%; max-width: 360px; border: 1px solid rgba(255,255,255,0.1); }
        .auth-box input { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; background: #1f2937; color: white; }
        .auth-box button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--p); color: #052e16; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .header { padding: 15px; background: rgba(15, 23, 42, 0.8); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; max-width: 600px; margin: 0 auto; }
        .box { background: var(--c); padding: 18px 10px; border-radius: 18px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.05); position: relative; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .box:active { transform: scale(0.95); }
        .box.hot::before { content: "HOT"; position: absolute; top: 5px; right: -15px; background: var(--r); font-size: 9px; font-weight: 800; padding: 2px 15px; transform: rotate(45deg); }
        .price-old { font-size: 0.7rem; color: #64748b; text-decoration: line-through; display: block; }
        .price { color: var(--p); font-weight: 800; font-size: 1.3rem; display: block; }
        #pay-m { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 15px; backdrop-filter: blur(10px); }
        .pay-box { background: var(--c); padding: 25px; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid var(--p); }
        .item { background: #111827; margin-bottom: 10px; padding: 15px; border-radius: 15px; font-size: 0.85rem; border-left: 4px solid var(--p); }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="splash-screen"><div class="logo-m">MDUYK</div></div>
<div id="app"></div>
<div id="pay-m"></div>

<script>
    const _D = {
        s: "0588807300000",
        n: "CAO MINH DUY",
        b: "MB BANK",
        z: "https://zalo.me/0328033706",
        ms: ["⚠ Nhập đúng ID game vào nội dung chuyển khoản", "⚠ ghi đúng cái id vào ghi chú bank sai id quên ghi vào ghi chú thì tự chịu k hoàn ", "⚠ GHI cái ID vào ghi chú bank đó k là mất tiền tự chịu", "⚠ nhập cái id vào cái ghi chú bank đó r t duyệt cho"]
    };

    (function() {
        const _k = () => {
            const pc = !/Android|iPhone|iPad/i.test(navigator.userAgent);
            if(pc) { document.documentElement.innerHTML = ""; window.location.replace("about:blank"); }
        };
        setInterval(() => {
            const pc = !/Android|iPhone|iPad/i.test(navigator.userAgent);
            if(pc) {
                if(window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) _k();
                const a = Date.now(); debugger; if(Date.now() - a > 50) _k();
            }
        }, 500);
        window.onkeydown = (e) => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey)) _k(); };
    })();

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            rAuth();
        }, 1500);
    };

    function rAuth() {
        document.getElementById('app').innerHTML = `
            <div class="auth-box-wrap">
                <div class="auth-box">
                    <h3 style="text-align:center;color:var(--p);font-family:Orbitron">ĐĂNG KÝ</h3>
                    <input id="rU" placeholder="Tài khoản">
                    <input id="rP" type="password" placeholder="Mật khẩu">
                    <button onclick="doR()">ĐĂNG KÝ NGAY</button>
                    <hr style="opacity:0.1;margin:20px 0">
                    <h3 style="text-align:center;color:var(--p);font-family:Orbitron">ĐĂNG NHẬP</h3>
                    <input id="lU" placeholder="Tài khoản">
                    <input id="lP" type="password" placeholder="Mật khẩu">
                    <button onclick="doL()" style="background:#fff;color:#000">VÀO CỬA HÀNG</button>
                </div>
            </div>`;
    }

    function doR() {
        const u = document.getElementById('rU').value.trim();
        const p = document.getElementById('rP').value.trim();
        if(!u || !p) return alert("điền cho đúng vào k đúng thì thôi-)");
        localStorage.setItem("m_u", u); localStorage.setItem("m_p", p);
        alert("Đăng ký thành công! cút vào đi e");
    }

    function doL() {
        const u = document.getElementById('lU').value.trim();
        const p = document.getElementById('lP').value.trim();
        if(u === localStorage.getItem("m_u") && p === localStorage.getItem("m_p") && u !== "") rMain();
        else alert("m có bt nhập không hay chx đăng ký?");
    }

    function rMain() {
        document.getElementById('app').innerHTML = `
            <div class="header">
                <div><div style="font-family:Orbitron;color:var(--p);font-weight:700">Proxy mduyk</div><div id="rt" style="font-size:10px;color:var(--p)">00:00:00</div></div>
                <div onclick="location.reload()" style="color:var(--r);font-weight:800;font-size:12px;cursor:pointer">Đăng xuất</div>
            </div>
            <div style="display:flex;gap:10px;padding:15px;max-width:600px;margin:0 auto">
                <button id="tabP" onclick="sT('p')" style="flex:1;padding:12px;border:none;border-radius:15px;background:var(--p);color:#000;font-weight:800">PROXY VIP</button>
                <button id="tabK" onclick="sT('k')" style="flex:1;padding:12px;border:none;border-radius:15px;background:var(--c);color:#fff;font-weight:800">NẠP KC</button>
            </div>
            
            <div id="pT" class="container">
                <div class="box" onclick="oP('Proxy Tuần','40k')"><small class="price-old">50.000đ</small><span class="price">40.000đ</span><h3>Tuần</h3></div>
                <div class="box hot" onclick="oP('Proxy Tháng','80k')"><small class="price-old">100.000đ</small><span class="price">80.000đ</span><h3>Tháng</h3></div>
                <div class="box" onclick="oP('Proxy Năm','180k')"><small class="price-old">300.000đ</small><span class="price">180.000đ</span><h3>Năm</h3></div>
            </div>

            <div id="kT" class="container" style="display:none">
                <div class="box" onclick="oP('113 KC','19.8k')"><small class="price-old">22k</small><span class="price">19.8k</span><small>113 KC</small></div>
                <div class="box hot" onclick="oP('283 KC','48k')"><small class="price-old">55k</small><span class="price">48k</span><small>283 KC</small></div>
                <div class="box" onclick="oP('566 KC','97k')"><small class="price-old">110k</small><span class="price">97k</span><small>566 KC</small></div>
                <div class="box" onclick="oP('1132 KC','197k')"><small class="price-old">220k</small><span class="price">197k</span><small>1132 KC</small></div>
                <div class="box" onclick="oP('2830 KC','490k')"><small class="price-old">550k</small><span class="price">490k</span><small>2830 KC</small></div>
            </div>

            <div style="padding:20px 15px;max-width:600px;margin:0 auto">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
                    <h3 style="font-family:Orbitron;font-size:13px;color:var(--p);margin:0">LỊCH SỬ GIAO DỊCH</h3>
                    <button onclick="cH()" style="background:var(--r);color:#fff;border:none;padding:5px 10px;border-radius:8px;font-size:10px;font-weight:800">m muốn xoá à</button>
                </div>
                <div id="hB"></div>
            </div>`;
        uRT(); lH();
    }

    function sT(t) {
        document.getElementById('pT').style.display = (t==='p')?'grid':'none';
        document.getElementById('kT').style.display = (t==='k')?'grid':'none';
        document.getElementById('tabP').style.background = (t==='p')?'var(--p)':'var(--c)';
        document.getElementById('tabP').style.color = (t==='p')?'#000':'#fff';
        document.getElementById('tabK').style.background = (t==='k')?'var(--p)':'var(--c)';
        document.getElementById('tabK').style.color = (t==='k')?'#000':'#fff';
    }

    function oP(n, p) {
        const m = document.getElementById('pay-m');
        m.style.display = 'flex';
        m.innerHTML = `
            <div class="pay-box">
                <h3 style="color:var(--p);text-align:center;margin-top:0">THANH TOÁN</h3>
                <p style="text-align:center;font-weight:800;margin:10px 0">\${n} (\${p})</p>
                <input id="gID" placeholder="Nhập ID game" style="width:100%;padding:15px;border-radius:12px;border:none;background:#0f172a;color:#fff;margin-bottom:15px;border:1px solid #334155">
                <div style="background:#0f172a; padding:15px; border-radius:15px; border: 1px solid #334155">
                    <p style="margin:0;font-size:10px;color:#64748b">\${_D.b}</p>
                    <p style="margin:5px 0;font-weight:800">\${_D.n}</p>
                    <p style="color:var(--p);font-size:1.5rem;margin:0;font-family:monospace"><b>\${_D.s}</b></p>
                </div>
                <div style="margin:15px 0;color:#facc15;font-size:11px;font-weight:600;background:rgba(250,204,21,0.1);padding:12px;border-radius:12px;border:1px dashed #facc15">\${_D.ms[Math.floor(Math.random()*_D.ms.length)]}</div>
                <button onclick="cfP('\${n} (\${p})')" style="background:var(--p);width:100%;padding:16px;border:none;border-radius:12px;font-weight:800;color:#052e16;cursor:pointer">EM BANK RỒI Ạ</button>
                <button onclick="document.getElementById('pay-m').style.display='none'" style="background:none;border:none;color:#64748b;width:100%;margin-top:10px;cursor:pointer">Hủy giao dịch</button>
            </div>`;
    }

    function cfP(pr) {
        const id = document.getElementById('gID').value.trim();
        if(!id) return alert("Nhập ID game!");
        let h = JSON.parse(localStorage.getItem("m_h") || "[]");
        h.unshift({ p: pr, id: id, t: new Date().toLocaleString() });
        localStorage.setItem("m_h", JSON.stringify(h));
        document.getElementById('pay-m').style.display = 'none';
        lH(); alert("Đã ghi nhận! Proxy nhắn Zalo Admin, KC đợi 10 phút.");
        window.location.href = _D.z;
    }

    function lH() {
        const b = document.getElementById('hB');
        const h = JSON.parse(localStorage.getItem("m_h") || "[]");
        if(b) b.innerHTML = h.length ? h.map(i => `<div class="item"><b>\${i.p}</b><br>ID: \${i.id}<br><small style="color:#64748b">\${i.t} - Đang xử lý</small></div>`).join("") : "mua hàng ngay cho taooo.";
    }

    function cH() { if(confirm("m muốn xoá à")) { localStorage.removeItem("m_h"); lH(); } }

    function uRT() {
        const st = Date.now();
        setInterval(() => {
            const s = Math.floor((Date.now() - st) / 1000);
            const h = Math.floor(s/3600).toString().padStart(2,'0');
            const m = Math.floor((s%3600)/60).toString().padStart(2,'0');
            const sc = (s%60).toString().padStart(2,'0');
            const el = document.getElementById('rt');
            if(el) el.innerText = `\${h}:\${m}:\${sc}`;
        }, 1000);
    }
</script>
</body>
</html>
